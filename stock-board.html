<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>轻量自选股看板</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f3ea;
      --ink: #181613;
      --muted: #70695d;
      --line: #d8d0c3;
      --panel: #fffdf8;
      --red: #c83232;
      --green: #12805c;
      --blue: #2457a7;
      --amber: #c97912;
      --shadow: 0 14px 42px rgba(45, 38, 27, .12);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(24, 22, 19, .035) 1px, transparent 1px),
        linear-gradient(rgba(24, 22, 19, .03) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
    }

    button, input, select { font: inherit; }

    .shell {
      width: min(1420px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--ink);
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 4vw, 58px);
      font-weight: 700;
      line-height: .96;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }

    .field {
      height: 38px;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      padding: 0 11px;
      outline: none;
      box-shadow: 3px 3px 0 rgba(24, 22, 19, .1);
    }

    .symbol-input { width: min(280px, 68vw); }

    .searchbox {
      position: relative;
    }

    .suggestions {
      position: absolute;
      z-index: 6;
      top: calc(100% + 6px);
      left: 0;
      width: min(380px, 86vw);
      display: none;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 5px 5px 0 rgba(24, 22, 19, .18), var(--shadow);
      max-height: min(520px, 70vh);
      overflow: hidden;
      overflow-y: auto;
    }

    .suggestions.open { display: block; }

    .suggestion {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px 11px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .suggestion:last-child { border-bottom: 0; }
    .suggestion:hover { background: #f2eadb; }
    .suggestion.active { background: #e7ecff; }

    .suggestion-name {
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .suggestion-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .suggestion-code {
      color: var(--blue);
      font-family: Consolas, monospace;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .suggestion mark {
      padding: 0 1px;
      border-radius: 3px;
      background: rgba(234, 168, 58, .32);
      color: inherit;
      font-weight: 900;
    }

    .btn {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--panel);
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(24, 22, 19, .16);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 rgba(24, 22, 19, .2);
    }

    .btn.secondary {
      background: var(--panel);
      color: var(--ink);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .statusbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin: 14px 0 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .ticker {
      overflow: hidden;
      white-space: nowrap;
      border-left: 5px solid var(--ink);
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
    }

    .card {
      position: relative;
      min-height: 292px;
      padding: 15px;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: var(--blue);
    }

    .card.up::before { background: var(--red); }
    .card.down::before { background: var(--green); }

    .card-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      margin-top: 2px;
    }

    .name {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .code {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0;
    }

    .remove {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 3px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 6px;
    }

    .price {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
    }

    .change {
      min-width: 86px;
      text-align: right;
      font-weight: 800;
      font-size: 15px;
    }

    .up .price, .up .change { color: var(--red); }
    .down .price, .down .change { color: var(--green); }

    .chart-wrap {
      height: 104px;
      margin: 10px 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(to bottom, transparent calc(50% - 1px), rgba(24, 22, 19, .12) 50%, transparent calc(50% + 1px)),
        #fbfaf5;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
    }

    .fact {
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .value {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      display: none;
      place-items: center;
      min-height: 240px;
      border: 1px dashed var(--muted);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 253, 248, .7);
    }

    .grid:empty + .empty { display: grid; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      max-width: min(520px, calc(100% - 28px));
      padding: 10px 13px;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--panel);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      z-index: 5;
    }

    .toast.show { opacity: 1; }

    .refresh-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .refresh-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #2fbf71;
      box-shadow: 0 0 0 0 rgba(47, 191, 113, .38);
    }

    .refresh-status.pulse .refresh-dot {
      animation: refreshPulse .72s ease-out;
    }

    @keyframes refreshPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(47, 191, 113, .48); }
      65% { transform: scale(1.25); box-shadow: 0 0 0 8px rgba(47, 191, 113, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(47, 191, 113, 0); }
    }

    .settings {
      width: min(460px, 100%);
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(24, 22, 19, .32);
      padding: 16px;
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .settings-title {
      font-size: 18px;
      font-weight: 900;
    }

    .setting-row {
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .setting-row small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .setting-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(24, 22, 19, .42);
      z-index: 4;
    }

    .modal.open { display: flex; }

    .detail {
      width: min(1120px, 100%);
      max-height: min(820px, calc(100vh - 36px));
      display: grid;
      grid-template-rows: auto auto auto minmax(260px, 1fr);
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(24, 22, 19, .32);
      overflow: hidden;
    }

    .detail-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
    }

    .detail-title {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
    }

    .detail-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-close {
      width: 34px;
      height: 34px;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--panel);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      flex: 0 0 auto;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfaf5;
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
    }

    .tab.active {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--panel);
    }

    .detail-canvas-wrap {
      position: relative;
      min-height: 300px;
      padding: 12px 12px 0;
      background:
        linear-gradient(to bottom, transparent calc(50% - 1px), rgba(24, 22, 19, .1) 50%, transparent calc(50% + 1px)),
        #fbfaf5;
    }

    .detail-canvas {
      width: 100%;
      height: 100%;
      min-height: 300px;
      display: block;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffdf8;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(6, minmax(80px, 1fr));
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    .chart-tools {
      position: static;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 0 10px;
      border-bottom: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }

    .chart-tool {
      width: 32px;
      height: 30px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
    }

    .chart-tool:hover {
      border-color: var(--ink);
      background: rgba(36, 87, 167, .08);
    }

    .chart-readout {
      flex: 1;
      min-width: 260px;
      max-width: min(620px, calc(100% - 190px));
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--panel);
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
    }

    .chart-tool.nav-left { margin-right: 0; }
    .chart-tool.nav-right { margin-left: 0; }

    .chart-tip {
      position: absolute;
      left: 0;
      top: 0;
      display: none;
      min-width: 210px;
      padding: 8px 10px;
      border: 1px solid #333947;
      border-radius: 6px;
      background: rgba(8, 10, 14, .94);
      color: #eef2f7;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .28);
      font-size: 12px;
      line-height: 1.55;
      pointer-events: none;
      z-index: 2;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
    }

    .theme-btn {
      font-size: 17px;
      line-height: 1;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --paper: #000;
      --ink: #f2f5fb;
      --muted: #8e97a8;
      --line: #20242d;
      --panel: #05070a;
      --red: #f05a72;
      --green: #39b86f;
      --blue: #8db7ff;
      --amber: #e0a942;
      --shadow: none;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --paper: #f5f7fb;
      --ink: #101a3d;
      --muted: #858da8;
      --line: #e9edf5;
      --panel: #ffffff;
      --red: #f04f4f;
      --green: #35ad63;
      --blue: #3158f4;
      --amber: #eaa83a;
      --shadow: 0 8px 28px rgba(22, 32, 66, .08);
    }

    @media (prefers-color-scheme: dark) {
      :root[data-theme="auto"] {
        color-scheme: dark;
        --paper: #000;
        --ink: #f2f5fb;
        --muted: #8e97a8;
        --line: #20242d;
        --panel: #05070a;
        --red: #f05a72;
        --green: #39b86f;
        --blue: #8db7ff;
        --amber: #e0a942;
        --shadow: none;
      }
    }

    :root[data-theme="dark"] body,
    :root[data-theme="auto"] body {
      background: var(--paper);
    }

    @media (prefers-color-scheme: light) {
      :root[data-theme="auto"] body {
        background: #f5f7fb;
      }
    }

    :root[data-theme="dark"] .shell,
    :root[data-theme="auto"] .shell {
      background: #05070a;
      box-shadow: none;
    }

    :root[data-theme="dark"] header,
    :root[data-theme="auto"] header {
      background: rgba(5, 7, 10, .94);
      border-bottom: 1px solid #20242d;
    }

    :root[data-theme="dark"] .field,
    :root[data-theme="auto"] .field {
      border-color: #242a35;
      background: #0d1118;
      color: #f2f5fb;
    }

    :root[data-theme="dark"] .btn,
    :root[data-theme="auto"] .btn {
      background: #111722;
      color: #dbe6ff;
    }

    :root[data-theme="dark"] .statusbar,
    :root[data-theme="auto"] .statusbar,
    :root[data-theme="dark"] .view-tabs,
    :root[data-theme="auto"] .view-tabs,
    :root[data-theme="dark"] .quote-header,
    :root[data-theme="auto"] .quote-header {
      border-color: #20242d;
      background: #05070a;
    }

    :root[data-theme="dark"] .card,
    :root[data-theme="auto"] .card {
      background: #05070a;
      border-color: #121720;
    }

    :root[data-theme="dark"] .card:hover,
    :root[data-theme="auto"] .card:hover {
      background: #0b1018;
    }

    :root[data-theme="dark"] .index-chip,
    :root[data-theme="auto"] .index-chip {
      background: #081c13;
    }

    :root[data-theme="dark"] .index-chip.up,
    :root[data-theme="auto"] .index-chip.up {
      background: #251016;
    }

    :root[data-theme="dark"] .index-chip.flat,
    :root[data-theme="auto"] .index-chip.flat {
      background: #131722;
    }

    :root[data-theme="dark"] .suggestions,
    :root[data-theme="auto"] .suggestions {
      border-color: #242a35;
      background: #0d1118;
      box-shadow: 0 18px 36px rgba(0, 0, 0, .38);
    }

    :root[data-theme="dark"] .suggestion,
    :root[data-theme="auto"] .suggestion {
      border-color: #20242d;
      color: #f2f5fb;
    }

    :root[data-theme="dark"] .suggestion:hover,
    :root[data-theme="dark"] .suggestion.active,
    :root[data-theme="auto"] .suggestion:hover,
    :root[data-theme="auto"] .suggestion.active {
      background: #182033;
    }

    @media (prefers-color-scheme: light) {
      :root[data-theme="auto"] .shell {
        background: #fff;
        box-shadow: 0 0 0 1px rgba(16, 26, 61, .04), 0 24px 70px rgba(22, 32, 66, .08);
      }

      :root[data-theme="auto"] header {
        background: rgba(255, 255, 255, .94);
        border-bottom: 0;
      }

      :root[data-theme="auto"] .field {
        border-color: #dfe5f0;
        background: #f9fbff;
        color: #101a3d;
      }

      :root[data-theme="auto"] .btn {
        background: #eef2ff;
        color: #3158f4;
      }

      :root[data-theme="auto"] .statusbar,
      :root[data-theme="auto"] .view-tabs,
      :root[data-theme="auto"] .quote-header {
        border-color: #e9edf5;
        background: #fff;
      }

      :root[data-theme="auto"] .card {
        background: #fff;
        border-color: #f0f2f7;
      }

      :root[data-theme="auto"] .card:hover {
        background: #f8faff;
      }

      :root[data-theme="auto"] .index-chip {
        background: #eaf6f0;
      }

      :root[data-theme="auto"] .index-chip.up {
        background: #fff0f0;
      }

      :root[data-theme="auto"] .index-chip.flat {
        background: #eef1fb;
      }
    }

    /* Compact quote terminal skin */
    :root {
      --paper: #f5f7fb;
      --ink: #101a3d;
      --muted: #858da8;
      --line: #e9edf5;
      --panel: #ffffff;
      --red: #f04f4f;
      --green: #35ad63;
      --blue: #3158f4;
      --amber: #eaa83a;
      --shadow: 0 8px 28px rgba(22, 32, 66, .08);
      --radius: 7px;
    }

    body {
      background: #f5f7fb;
      font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1100px, 100%);
      min-height: 100vh;
      padding: 0 0 58px;
      background: var(--panel);
      box-shadow: 0 0 0 1px rgba(16, 26, 61, .04), 0 24px 70px rgba(22, 32, 66, .08);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 3;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
      padding: 14px 24px 10px;
      border-bottom: 0;
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(14px);
    }

    header section:first-child {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 190px;
    }

    header section:first-child::before {
      content: "股";
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 900;
      font-size: 19px;
      background: radial-gradient(circle at 35% 30%, #8fc6ff 0 18%, #3158f4 54%, #173ca7 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35), 0 8px 18px rgba(49,88,244,.24);
    }

    h1 {
      display: inline;
      font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1 br { display: none; }

    .subtitle {
      display: none;
    }

    .toolbar {
      justify-content: flex-end;
      gap: 9px;
    }

    .field {
      height: 36px;
      border: 1px solid #dfe5f0;
      background: #f9fbff;
      color: var(--ink);
      box-shadow: none;
    }

    .symbol-input {
      width: min(390px, 42vw);
    }

    .btn {
      width: 36px;
      height: 36px;
      border: 0;
      background: #eef2ff;
      color: var(--blue);
      box-shadow: none;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(49, 88, 244, .16);
    }

    .btn.secondary {
      background: transparent;
      color: #9aa2b7;
    }

    .suggestions {
      border-color: #dfe5f0;
      box-shadow: 0 18px 36px rgba(22, 32, 66, .16);
    }

    .suggestion:hover {
      background: #f3f6ff;
    }

    .statusbar {
      margin: 0;
      padding: 4px 24px 12px;
      grid-template-columns: 1fr auto;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .ticker {
      border-left: 0;
      padding-left: 0;
      font-size: 12px;
    }

    .market-strip {
      display: grid;
      grid-template-columns: minmax(178px, 1.35fr) repeat(4, minmax(118px, 1fr));
      gap: 16px;
      padding: 12px 24px 16px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .market-strip:empty {
      display: none;
    }

    .index-chip {
      min-width: 138px;
      padding: 10px 12px 9px;
      border-radius: 6px;
      text-align: center;
      background: #eaf6f0;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease;
    }

    .index-chip:first-child {
      min-width: 178px;
      border: 2px solid var(--ink);
      box-shadow: 4px 4px 0 rgba(24, 22, 19, .16);
      transform: translateY(-2px);
    }

    .index-chip:first-child .index-name {
      font-size: 15px;
    }

    .index-chip:first-child .index-price {
      font-size: 28px;
    }

    .index-chip.up {
      background: #fff0f0;
    }

    .index-chip.flat {
      background: #eef1fb;
    }

    .index-name {
      font-size: 13px;
      font-weight: 900;
      color: var(--ink);
    }

    .index-price {
      margin-top: 6px;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 22px;
      line-height: 1;
      color: var(--green);
    }

    .index-chip.up .index-price,
    .index-chip.up .index-change {
      color: var(--red);
    }

    .index-chip.flat .index-price,
    .index-chip.flat .index-change {
      color: #a1a8bb;
    }

    .index-change {
      margin-top: 6px;
      display: flex;
      justify-content: center;
      gap: 12px;
      color: var(--green);
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 16px;
    }

    .view-tabs {
      display: none;
      gap: 20px;
      padding: 12px 24px 10px;
      border-bottom: 1px solid var(--line);
      color: #8a91ad;
      font-size: 18px;
      font-weight: 800;
    }

    .view-tabs span.active {
      position: relative;
      color: var(--ink);
    }

    .view-tabs span.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 30px;
      height: 3px;
      border-radius: 3px;
      background: var(--blue);
      transform: translateX(-50%);
    }

    .quote-header {
      display: grid;
      grid-template-columns: minmax(190px, 1.4fr) .8fr .8fr .8fr .8fr 140px 34px;
      gap: 10px;
      align-items: center;
      padding: 10px 24px 8px;
      border-bottom: 1px solid var(--line);
      color: #737c9b;
      font-size: 12px;
      text-align: right;
    }

    .quote-header div:first-child {
      text-align: left;
    }

    .grid {
      display: block;
      padding: 0 0 10px;
    }

    .card {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(190px, 1.4fr) .8fr .8fr .8fr .8fr 140px 34px;
      gap: 10px;
      align-items: center;
      padding: 11px 24px;
      border: 0;
      border-bottom: 1px solid #f0f2f7;
      border-radius: 0;
      background: var(--panel);
      box-shadow: none;
      overflow: visible;
      transition: background .14s ease;
    }

    .card:hover {
      background: #f8faff;
    }

    .card::before {
      display: none;
    }

    .card-head {
      display: block;
      margin-top: 0;
      min-width: 0;
    }

    .name {
      font-size: 17px;
      font-weight: 900;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .code {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      color: #7f87a5;
      font-size: 13px;
    }

    .code::after {
      content: "已更新";
      padding: 1px 5px;
      border: 1px solid #8fa3ff;
      border-radius: 4px;
      color: #3158f4;
      font-size: 11px;
      line-height: 1.2;
    }

    .price-row {
      display: contents;
      margin: 0;
    }

    .price {
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 24px;
      line-height: 1;
      text-align: right;
      color: var(--ink);
    }

    .change {
      min-width: 0;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 20px;
      line-height: 1.35;
      text-align: right;
      font-weight: 900;
    }

    .chart-wrap {
      height: 62px;
      margin: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .card.dragging {
      opacity: .45;
    }

    .card.drop-target {
      box-shadow: inset 0 2px 0 var(--blue);
    }

    .metric-button {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;
      text-align: right;
      cursor: pointer;
      padding: 0;
    }

    .metric-button:hover {
      color: var(--blue);
    }

    .metric-button[data-metric="amount"] {
      color: #7f87a5 !important;
    }

    .index-chip.dragging,
    .index-chip.drop-target {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .facts {
      display: contents;
      padding-top: 0;
      border-top: 0;
    }

    .fact {
      text-align: right;
    }

    .label {
      display: none;
    }

    .value {
      margin-top: 0;
      color: #7f87a5;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 16px;
      font-weight: 700;
    }

    .facts .fact:nth-child(1),
    .facts .fact:nth-child(2),
    .facts .fact:nth-child(3) {
      display: none;
    }

    .remove {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      color: #b0b6c8;
      border-radius: 50%;
    }

    .remove:hover {
      background: #eef2ff;
      color: var(--blue);
    }

    .empty {
      margin: 22px 24px;
      background: #f8faff;
      border-color: #dfe5f0;
    }

    .modal {
      background: rgba(14, 21, 45, .42);
    }

    .detail {
      border: 0;
      border-radius: 10px;
      box-shadow: 0 28px 90px rgba(14, 21, 45, .34);
      background: #07090d;
    }

    .detail-head {
      padding: 16px 18px 12px;
      border-bottom-color: #242833;
      background: #0b0e14;
      color: #eef2f7;
    }

    .detail-title { color: #eef2f7; }
    .detail-sub { color: #8c94a3; }

    .tabs {
      border-bottom-color: #242833;
      background: #080b10;
    }

    .tab {
      border-color: transparent;
      background: transparent;
      color: #9aa3b2;
    }

    .tab.active {
      border-color: #384151;
      background: #1a202b;
      color: #fff;
    }

    .detail-close {
      border: 0;
      background: #eef2ff;
      color: var(--blue);
    }

    .detail-canvas-wrap {
      padding: 0;
      background: #020403;
    }

    .detail-canvas {
      min-height: 430px;
      border: 0;
      border-radius: 0;
      background: #020403;
      cursor: crosshair;
    }

    .detail-meta {
      border-top-color: #242833;
      background: #080b10;
    }

    .detail-meta .label { color: #727b8d; }
    .detail-meta .value { color: #dce2ec; }

    @media (max-width: 780px) {
      header {
        grid-template-columns: 1fr;
        align-items: start;
        padding: 12px 14px 8px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .symbol-input {
        width: min(100%, 330px);
      }

      .statusbar {
        grid-template-columns: 1fr;
        padding-left: 14px;
        padding-right: 14px;
      }

      .market-strip {
        grid-auto-flow: column;
        grid-auto-columns: 148px;
        grid-template-columns: none;
        gap: 10px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .view-tabs {
        padding-left: 14px;
        padding-right: 14px;
      }

      .quote-header {
        grid-template-columns: minmax(150px, 1.3fr) .7fr .7fr .7fr 30px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .quote-header div:nth-child(5),
      .quote-header div:nth-child(6) {
        display: none;
      }

      .card {
        grid-template-columns: minmax(150px, 1.3fr) .7fr .7fr .7fr 30px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .facts,
      .chart-wrap {
        display: none;
      }

      .detail {
        max-height: calc(100vh - 20px);
      }

      .detail-meta {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 390px) {
      .shell { width: min(100% - 18px, 1420px); }
      .price { font-size: 19px; }
      .change { font-size: 17px; }
      .name { font-size: 15px; }
      .detail-meta { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <section>
        <h1>自选股<br>实时看板</h1>
        <div class="subtitle">A 股与指数 · 批量刷新 · 当日分时 · 本地保存</div>
      </section>
      <section class="toolbar" aria-label="工具栏">
        <div class="searchbox">
          <input id="symbolInput" class="field symbol-input" autocomplete="off" placeholder="搜名称/代码/拼音，如 中科仪 / 920186 / zky" />
          <div id="suggestions" class="suggestions"></div>
        </div>
        <button id="addBtn" class="btn" title="添加">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <input id="intervalInput" class="field" type="number" min="1" step="1" value="5" title="刷新间隔（秒）" style="width: 92px; display:none" />
        <button id="refreshBtn" class="btn secondary" title="立即刷新">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        </button>
        <button id="themeBtn" class="btn secondary theme-btn" title="主题：自动" aria-label="切换主题">💻</button>
        <button id="settingsBtn" class="btn secondary theme-btn" title="设置" aria-label="设置">⚙</button>
        <button id="syncBtn" class="btn secondary theme-btn" title="云端同步" aria-label="云端同步" style="display:none">☁</button>
        <button id="resetBtn" class="btn secondary" title="恢复默认" style="display:none">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg>
        </button>
      </section>
    </header>

    <section class="statusbar">
      <div id="ticker" class="ticker">准备刷新行情...</div>
      <div id="refreshStatus" class="refresh-status"><span class="refresh-dot"></span><span id="clock">--:--:--</span></div>
    </section>

    <section id="marketStrip" class="market-strip"></section>
    <section class="quote-header">
      <div>自选管理</div>
      <div>最新</div>
      <div>涨跌幅</div>
      <div>涨跌额</div>
      <div>成交额</div>
      <div>当日分时</div>
      <div></div>
    </section>
    <section id="grid" class="grid" aria-live="polite"></section>
    <section class="empty">暂无自选项，输入股票或指数代码添加。</section>
  </main>

  <section id="detailModal" class="modal" aria-hidden="true">
    <article class="detail">
      <div class="detail-head">
        <div>
          <div id="detailTitle" class="detail-title">--</div>
          <div id="detailSub" class="detail-sub">点击卡片进入详情，Esc 关闭</div>
        </div>
        <button id="detailClose" class="detail-close" title="关闭">×</button>
      </div>
      <div id="detailTabs" class="tabs">
        <button class="tab active" data-view="today">当日</button>
        <button class="tab" data-view="five">5 日分时</button>
        <button class="tab" data-view="day">日 K</button>
        <button class="tab" data-view="week">周 K</button>
        <button class="tab" data-view="month">月 K</button>
        <button class="tab" data-view="year">年 K</button>
      </div>
      <div class="detail-canvas-wrap">
        <canvas id="detailCanvas" class="detail-canvas"></canvas>
        <div id="chartTip" class="chart-tip"></div>
        <div class="chart-tools">
          <button id="chartPrev" class="chart-tool nav-left" type="button" title="上一段">&lt;</button>
          <span id="chartReadout" class="chart-readout">移动鼠标查看精确时间、价格和成交量</span>
          <button id="chartZoomOut" class="chart-tool" type="button" title="缩小">-</button>
          <button id="chartReset" class="chart-tool" type="button" title="重置">⟳</button>
          <button id="chartZoomIn" class="chart-tool" type="button" title="放大">+</button>
          <button id="chartNext" class="chart-tool nav-right" type="button" title="下一段">&gt;</button>
        </div>
      </div>
      <div id="detailMeta" class="detail-meta"></div>
    </article>
  </section>

  <section id="settingsModal" class="modal" aria-hidden="true">
    <article class="settings">
      <div class="settings-head">
        <div class="settings-title">设置</div>
        <button id="settingsClose" class="detail-close" title="关闭">×</button>
      </div>
      <div class="setting-row">
        <div>
          刷新间隔
          <small>单位：秒，支持 1s 起</small>
        </div>
        <input id="settingsIntervalInput" class="field" type="number" min="1" max="300" step="1" value="5" />
      </div>
      <div class="setting-row">
        <div>
          主题
          <small>左：浅色，中：自动，右：深色</small>
        </div>
        <input id="settingsThemeRange" type="range" min="0" max="2" step="1" value="1" />
      </div>
      <div class="setting-row">
        <div>
          云端同步
          <small>默认同一用户，预留账号接口</small>
        </div>
        <button id="settingsSyncBtn" class="btn secondary" type="button" title="立即同步">☁</button>
      </div>
      <div class="setting-actions">
        <button id="settingsResetBtn" class="btn secondary" type="button" title="恢复默认">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg>
        </button>
      </div>
    </article>
  </section>

  <div id="toast" class="toast" role="status"></div>

  <script>
    const STORAGE_KEY = "lite-stock-board-symbols-v1";
    const REFRESH_KEY = "lite-stock-board-refresh-v1";
    const THEME_KEY = "lite-stock-board-theme-v1";
    const SYNC_KEY = "lite-stock-board-sync-id-v1";
    const DISPLAY_KEY = "lite-stock-board-display-v1";
    const API_QUOTE = "https://push2.eastmoney.com/api/qt/ulist.np/get";
    const API_TREND = "https://push2his.eastmoney.com/api/qt/stock/trends2/get";
    const API_KLINE = "https://push2his.eastmoney.com/api/qt/stock/kline/get";
    const API_MARKET_PROXY = location.protocol.startsWith("http") ? "/api/market" : "https://tiny-stocks.pages.dev/api/market";
    const API_SYNC = location.protocol.startsWith("http") ? "/api/sync" : "https://tiny-stocks.pages.dev/api/sync";
    const API_SEARCH = "https://searchapi.eastmoney.com/api/suggest/get";
    const SEARCH_TOKEN = "D43BF722C8E33BDC906FB84D85E326E8";
    const DEFAULT_SYMBOLS = ["1.000001", "0.399001", "0.399006", "1.600519", "0.000001"];
    const DEFAULT_SYNC_ID = "default-user";

    const els = {
      grid: document.querySelector("#grid"),
      marketStrip: document.querySelector("#marketStrip"),
      ticker: document.querySelector("#ticker"),
      clock: document.querySelector("#clock"),
      input: document.querySelector("#symbolInput"),
      suggestions: document.querySelector("#suggestions"),
      add: document.querySelector("#addBtn"),
      refresh: document.querySelector("#refreshBtn"),
      refreshStatus: document.querySelector("#refreshStatus"),
      reset: document.querySelector("#resetBtn"),
      interval: document.querySelector("#intervalInput"),
      toast: document.querySelector("#toast"),
      modal: document.querySelector("#detailModal"),
      detailTitle: document.querySelector("#detailTitle"),
      detailSub: document.querySelector("#detailSub"),
      detailTabs: document.querySelector("#detailTabs"),
      detailCanvas: document.querySelector("#detailCanvas"),
      chartTip: document.querySelector("#chartTip"),
      chartReadout: document.querySelector("#chartReadout"),
      chartPrev: document.querySelector("#chartPrev"),
      chartNext: document.querySelector("#chartNext"),
      chartZoomIn: document.querySelector("#chartZoomIn"),
      chartZoomOut: document.querySelector("#chartZoomOut"),
      chartReset: document.querySelector("#chartReset"),
      theme: document.querySelector("#themeBtn"),
      settings: document.querySelector("#settingsBtn"),
      settingsModal: document.querySelector("#settingsModal"),
      settingsClose: document.querySelector("#settingsClose"),
      settingsInterval: document.querySelector("#settingsIntervalInput"),
      settingsThemeRange: document.querySelector("#settingsThemeRange"),
      settingsSync: document.querySelector("#settingsSyncBtn"),
      settingsReset: document.querySelector("#settingsResetBtn"),
      sync: document.querySelector("#syncBtn"),
      detailMeta: document.querySelector("#detailMeta"),
      detailClose: document.querySelector("#detailClose")
    };

    let symbols = loadSymbols();
    let quoteMap = new Map();
    let trendMap = new Map();
    let displayMetrics = loadDisplayMetrics();
    let detailState = { secid: null, view: "today", loading: false };
    let detailCache = new Map();
    let chartState = { type: null, data: [], offset: 0, window: 90, hover: null, dragging: false, dragX: 0, dragOffset: 0 };
    let suggestions = [];
    let activeSuggestionIndex = -1;
    let searchTimer = null;
    let refreshTimer = null;
    let syncTimer = null;
    let lastTrendRefresh = 0;

    function loadSymbols() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (Array.isArray(saved) && saved.length) {
          return [...new Set(saved.map(secid => {
            const text = String(secid);
            return /^1\.[89]\d{5}$/.test(text) ? `0.${text.slice(2)}` : text;
          }))];
        }
        return DEFAULT_SYMBOLS.slice();
      } catch {
        return DEFAULT_SYMBOLS.slice();
      }
    }

    function saveSymbols() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(symbols));
      queueCloudSync();
    }

    function loadDisplayMetrics() {
      try {
        const data = JSON.parse(localStorage.getItem(DISPLAY_KEY) || "{}");
        return data && typeof data === "object" ? data : {};
      } catch {
        return {};
      }
    }

    function saveDisplayMetrics() {
      localStorage.setItem(DISPLAY_KEY, JSON.stringify(displayMetrics));
      queueCloudSync();
    }

    function loadRefreshSeconds() {
      const n = Number(localStorage.getItem(REFRESH_KEY));
      return Number.isFinite(n) && n >= 1 ? Math.round(n) : 5;
    }

    function saveRefreshSeconds() {
      const seconds = Math.max(1, Math.round(Number(els.interval.value) || 5));
      els.interval.value = seconds;
      localStorage.setItem(REFRESH_KEY, String(seconds));
      queueCloudSync();
      return seconds;
    }

    function normalizeSymbol(raw) {
      const text = String(raw || "").trim().toLowerCase().replace(/\s+/g, "");
      if (!text) return null;
      if (/^[01]\.\d{6}$/.test(text)) return text;
      if (/^sh\d{6}$/.test(text)) return `1.${text.slice(2)}`;
      if (/^sz\d{6}$/.test(text)) return `0.${text.slice(2)}`;
      if (/^\d{6}$/.test(text)) {
        if (text.startsWith("6") || text.startsWith("5")) return `1.${text}`;
        return `0.${text}`;
      }
      return null;
    }

    function secidToDisplay(secid) {
      const [market, code] = secid.split(".");
      const prefix = market === "1" ? "SH" : /^[89]\d{5}$/.test(code) ? "BJ" : "SZ";
      return `${prefix} ${code}`;
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toast.hideTimer);
      toast.hideTimer = setTimeout(() => els.toast.classList.remove("show"), 2600);
    }

    function markRefresh() {
      if (!els.refreshStatus) return;
      els.refreshStatus.classList.remove("pulse");
      void els.refreshStatus.offsetWidth;
      els.refreshStatus.classList.add("pulse");
    }

    function formatNum(value, digits = 2) {
      const n = Number(value);
      if (!Number.isFinite(n) || n === -1) return "--";
      return n.toFixed(digits);
    }

    function formatAmount(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return "--";
      if (n >= 1e12) return `${(n / 1e12).toFixed(2)} 万亿`;
      if (n >= 1e8) return `${(n / 1e8).toFixed(2)} 亿`;
      if (n >= 1e4) return `${(n / 1e4).toFixed(2)} 万`;
      return n.toFixed(0);
    }

    function quoteClass(q) {
      const p = Number(q?.f3);
      if (p > 0) return "up";
      if (p < 0) return "down";
      return "flat";
    }

    const METRICS = ["price", "pct", "diff", "amount"];

    function metricLabel(metric) {
      return ({ price: "最新", pct: "涨跌幅", diff: "涨跌额", amount: "成交额" })[metric] || metric;
    }

    function metricValue(metric, q) {
      const pct = Number(q?.f3);
      const diff = Number(q?.f4);
      const pctSign = pct > 0 ? "+" : "";
      const diffSign = diff > 0 ? "+" : "";
      if (metric === "pct") return `${pctSign}${formatNum(q?.f3)}%`;
      if (metric === "diff") return `${diffSign}${formatNum(q?.f4)}`;
      if (metric === "amount") return formatAmount(q?.f6);
      return formatNum(q?.f2);
    }

    function metricClass(metric, q) {
      if (metric === "amount") return "";
      return quoteClass(q);
    }

    function activeMetric(secid) {
      return METRICS.includes(displayMetrics[secid]) ? displayMetrics[secid] : "price";

    function sideMetrics(secid) {
      const main = activeMetric(secid);
      return METRICS.filter(metric => metric !== main).slice(0, 3);

      }
      if (els.settingsThemeRange) {
        els.settingsThemeRange.value = value === "light" ? "0" : value === "dark" ? "2" : "1";

      return {

        accountMode: "reserved-default",

    function syncId() {
      const id = localStorage.getItem(SYNC_KEY) || DEFAULT_SYNC_ID;
      if (!localStorage.getItem(SYNC_KEY)) localStorage.setItem(SYNC_KEY, id);

    function queueCloudSync() {
      const id = syncId();

    async function uploadCloudSync(id) {
      try {
        await fetch(`${API_SYNC}?id=${encodeURIComponent(id)}`, {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(getCloudPayload())
        });
        markRefresh();
      } catch {
        toast("云同步暂时不可用，已保留本地配置");
      }
    }

    async function downloadCloudSync(id) {
      const res = await fetch(`${API_SYNC}?id=${encodeURIComponent(id)}`, { cache: "no-store" });
      if (res.status === 404) return false;
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (Array.isArray(data.symbols) && data.symbols.length) {
        symbols = [...new Set(data.symbols)];
        saveSymbols();
      }
      if (Number(data.refreshSeconds) >= 1) {
        els.interval.value = Math.round(Number(data.refreshSeconds));
        saveRefreshSeconds();
        scheduleRefresh();
      }
      if (data.theme) applyTheme(data.theme);
      if (data.displayMetrics && typeof data.displayMetrics === "object") {
        displayMetrics = data.displayMetrics;
        saveDisplayMetrics();
      }
      render();
      refreshAll();
      return true;
    }

      } catch {

    function isIndexSecid(secid) {
      return ["1.000001", "0.399001", "0.399006", "1.000300", "1.000016", "0.399300"].includes(secid);
    }

    async function fetchJson(url, params) {
      const qs = new URLSearchParams(params);
      let lastError;
      for (let i = 0; i < 2; i++) {
        try {
          const res = await fetch(`${url}?${qs.toString()}`, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        } catch (err) {
          lastError = err;
          await new Promise(resolve => setTimeout(resolve, 350 + i * 500));
        }
      }
      throw lastError;
    }

    async function searchStocks(keyword) {
      const input = String(keyword || "").trim();
      if (!input) return [];
      const data = await fetchJsonp(API_SEARCH, {
        input,
        type: "14",
        count: "30",
        token: SEARCH_TOKEN
      });
      const q = normalizeQuery(input);
      return (data?.QuotationCodeTable?.Data || [])
        .filter(item => item?.QuoteID && /^\d+\.\d{6}$/.test(item.QuoteID))
        .map(item => ({
          secid: item.QuoteID,
          code: item.Code,
          name: item.Name,
          pinyin: item.PinYin,
          market: item.SecurityTypeName || item.MarketType || "",
          classify: item.Classify || "",
          score: matchScore(q, item)
        }))
        .filter(item => item.score < 900)
        .sort((a, b) => a.score - b.score || a.code.localeCompare(b.code))
        .slice(0, 20);
    }

    function normalizeQuery(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, "");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function containsSubsequence(text, query) {
      let cursor = 0;
      const source = normalizeQuery(text);
      for (const ch of query) {
        cursor = source.indexOf(ch, cursor);
        if (cursor === -1) return false;
        cursor += 1;
      }
      return true;
    }

    function matchScore(query, item) {
      if (!query) return 0;
      const code = normalizeQuery(item.Code);
      const name = normalizeQuery(item.Name);
      const pinyin = normalizeQuery(item.PinYin);
      const fields = [code, name, pinyin];
      if (code === query) return 0;
      if (code.startsWith(query)) return 2;
      if (pinyin.startsWith(query)) return 4;
      if (name.includes(query)) return 6;
      if (fields.some(field => field.includes(query))) return 10;
      if (fields.some(field => containsSubsequence(field, query))) return 18;
      return 999;
    }

    function highlightMatch(value, query) {
      const text = String(value ?? "");
      const q = normalizeQuery(query);
      if (!q) return escapeHtml(text);
      const lower = text.toLowerCase();
      const exact = lower.indexOf(q);
      const mark = new Set();
      if (exact >= 0) {
        for (let i = exact; i < exact + q.length; i++) mark.add(i);
      } else {
        let cursor = 0;
        for (const ch of q) {
          const found = lower.indexOf(ch, cursor);
          if (found === -1) break;
          mark.add(found);
          cursor = found + 1;
        }
      }
      let html = "";
      let open = false;
      [...text].forEach((ch, i) => {
        if (mark.has(i) && !open) {
          html += "<mark>";
          open = true;
        }
        if (!mark.has(i) && open) {
          html += "</mark>";
          open = false;
        }
        html += escapeHtml(ch);
      });
      if (open) html += "</mark>";
      return html;
    }

    function fetchJsonp(url, params) {
      return new Promise((resolve, reject) => {
        const callbackName = `stockSearch_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const clean = () => {
          delete window[callbackName];
          script.remove();
        };
        window[callbackName] = data => {
          clean();
          resolve(data);
        };
        script.onerror = () => {
          clean();
          reject(new Error("搜索接口不可用"));
        };
        const qs = new URLSearchParams({ ...params, cb: callbackName });
        script.src = `${url}?${qs.toString()}`;
        document.head.appendChild(script);
      });
    }

    function renderSuggestions(items) {
      suggestions = items;
      if (!items.length) {
        activeSuggestionIndex = -1;
        els.suggestions.classList.remove("open");
        els.suggestions.innerHTML = "";
        return;
      }
      if (activeSuggestionIndex < 0 || activeSuggestionIndex >= items.length) activeSuggestionIndex = 0;
      const keyword = els.input.value.trim();
      els.suggestions.innerHTML = items.map((item, index) => `
        <button class="suggestion ${index === activeSuggestionIndex ? "active" : ""}" data-index="${index}" type="button">
          <span>
            <span class="suggestion-name">${highlightMatch(item.name || item.code, keyword)}</span>
            <div class="suggestion-meta">${highlightMatch(item.pinyin || "--", keyword)} · ${escapeHtml(item.market || item.classify || "--")}</div>
          </span>
          <span class="suggestion-code">${highlightMatch(secidToDisplay(item.secid), keyword)}</span>
        </button>
      `).join("");
      els.suggestions.classList.add("open");
    }

    function moveSuggestion(delta) {
      if (!suggestions.length) return;
      activeSuggestionIndex = (activeSuggestionIndex + delta + suggestions.length) % suggestions.length;
      renderSuggestions(suggestions);
      els.suggestions.querySelector(`[data-index="${activeSuggestionIndex}"]`)?.scrollIntoView({ block: "nearest" });
    }

    function selectedSuggestion() {
      if (!suggestions.length) return null;
      return suggestions[Math.max(0, Math.min(activeSuggestionIndex, suggestions.length - 1))];
    }

    function scheduleSearch() {
      clearTimeout(searchTimer);
      const keyword = els.input.value.trim();
      activeSuggestionIndex = -1;
      if (!keyword) {
        renderSuggestions([]);
        return;
      }
      searchTimer = setTimeout(async () => {
        try {
          renderSuggestions(await searchStocks(keyword));
        } catch {
          renderSuggestions([]);
        }
      }, 180);
    }

    async function resolveInputToSecid() {
      const keyword = els.input.value.trim();
      if (!keyword) return null;
      const selected = selectedSuggestion();
      if (selected) return selected.secid;
      try {
        const found = await searchStocks(keyword);
        if (found.length) return found[0].secid;
      } catch {
        // Fall back to local code heuristics when search is unavailable.
      }
      return normalizeSymbol(keyword);
    }

    async function fetchTrend(secid, days = 1) {
      const params = {
        secid,
        fields1: "f1,f2,f3",
        fields2: "f51,f53",
        iscr: "0",
        iscca: "0",
        ndays: String(days)
      };
      let data;
      try {
        data = await fetchJson(API_TREND, params);
        const direct = parseTrendData(data);
        if (direct.length) return direct;
      } catch (err) {
      }
      data = await fetchJson(`${API_MARKET_PROXY}/trend`, { secid, days: String(days) });
      return parseTrendData(data);
    }

    function parseTrendData(data) {
      return (data?.data?.trends || [])
        .map(row => {
          const [time, price] = String(row).split(",");
          return { time, price: Number(price) };
        })
        .filter(p => Number.isFinite(p.price));
    }

    async function fetchKline(secid, klt, begin = "20180101") {
      const data = await fetchJson(API_KLINE, {
        secid,
        fields1: "f1,f2,f3",
        fields2: "f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61",
        klt: String(klt),
        fqt: "1",
        beg: begin,
        end: "20500101"
      });
      return (data?.data?.klines || [])
        .map(row => {
          const [date, open, close, high, low, volume, amount, amplitude, pct, change, turnover] = String(row).split(",");
          return {
            date,
            open: Number(open),
            close: Number(close),
            high: Number(high),
            low: Number(low),
            volume: Number(volume),
            amount: Number(amount),
            pct: Number(pct),
            change: Number(change),
            turnover: Number(turnover)
          };
        })
        .filter(k => [k.open, k.close, k.high, k.low].every(Number.isFinite));
    }

    function aggregateYearly(monthKlines) {
      const groups = new Map();
      monthKlines.forEach(k => {
        const year = k.date.slice(0, 4);
        if (!groups.has(year)) groups.set(year, []);
        groups.get(year).push(k);
      });
      return [...groups.entries()].map(([year, items]) => {
        const first = items[0];
        const last = items[items.length - 1];
        return {
          date: year,
          open: first.open,
          close: last.close,
          high: Math.max(...items.map(k => k.high)),
          low: Math.min(...items.map(k => k.low)),
          volume: items.reduce((sum, k) => sum + (k.volume || 0), 0),
          amount: items.reduce((sum, k) => sum + (k.amount || 0), 0),
          pct: first.open ? (last.close - first.open) / first.open * 100 : 0,
          change: last.close - first.open,
          turnover: items.reduce((sum, k) => sum + (k.turnover || 0), 0)
        };
      });
    }

      };
      let data;
      try {

        if (!data?.data?.diff?.length) {

        data = await fetchJson(`${API_MARKET_PROXY}/quote`, { secids: symbols.join(",") });

              `).join("")}

    function renderCharts() {
      document.querySelectorAll("canvas[data-chart]").forEach(canvas => {
        drawChart(canvas, trendMap.get(canvas.dataset.chart) || [], quoteMap.get(canvas.dataset.chart));
      });
    }

    function drawChart(canvas, points, quote) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, rect.width, rect.height);

      const pad = 9;
      const w = rect.width;
      const h = rect.height;
      const color = Number(quote?.f3) >= 0 ? "#c83232" : "#12805c";
      const values = points.map(p => p.price);

      if (values.length < 2) {
        ctx.fillStyle = "#70695d";
        ctx.font = "12px Microsoft YaHei UI, sans-serif";
        ctx.fillText("暂无分时", pad, h / 2 + 4);
        return;
      }

      const min = Math.min(...values);
      const max = Math.max(...values);
      const spread = Math.max(max - min, Math.abs(max) * .002, 0.01);
      const yFor = v => pad + (max - v) / spread * (h - pad * 2);
      const xFor = i => pad + i / (values.length - 1) * (w - pad * 2);

      ctx.beginPath();
      values.forEach((v, i) => {
        const x = xFor(i);
        const y = yFor(v);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.lineTo(xFor(values.length - 1), h - pad);
      ctx.lineTo(xFor(0), h - pad);
      ctx.closePath();
      const fill = ctx.createLinearGradient(0, pad, 0, h);
      fill.addColorStop(0, color + "38");
      fill.addColorStop(1, color + "00");
      ctx.fillStyle = fill;
      ctx.fill();

      ctx.beginPath();
      values.forEach((v, i) => {
        const x = xFor(i);
        const y = yFor(v);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#70695d";
      ctx.font = "11px Microsoft YaHei UI, sans-serif";
      ctx.fillText(points[0].time.slice(11, 16), pad, h - 7);
      ctx.textAlign = "right";
      ctx.fillText(points[points.length - 1].time.slice(11, 16), w - pad, h - 7);
    }

    function detailCacheKey(secid, view) {
      return `${secid}:${view}`;
    }

    async function loadDetailData(secid, view) {
      const key = detailCacheKey(secid, view);
      if (view === "today") {
        let points = trendMap.get(secid) || [];
        if (!points.length) {
          points = await fetchTrend(secid, 1);
          if (points.length) trendMap.set(secid, points);
        }
        return { type: "line", points, days: 1 };
      }
      if (detailCache.has(key)) return detailCache.get(key);

      let result;
      if (view === "five") {
        result = { type: "line", points: await fetchTrend(secid, 5), days: 5 };
      } else if (view === "day") {
        result = { type: "kline", klines: await fetchKline(secid, 101, "20240101") };
      } else if (view === "week") {
        result = { type: "kline", klines: await fetchKline(secid, 102, "20200101") };
      } else if (view === "month") {
        result = { type: "kline", klines: await fetchKline(secid, 103, "20150101") };
      } else {
        const months = await fetchKline(secid, 103, "20000101");
        result = { type: "kline", klines: aggregateYearly(months) };
      }
      detailCache.set(key, result);
      return result;
    }
