        <div class="fact"><div class="label">最低</div><div class="value">${formatNum(quote?.f16)}</div></div>
        <div class="fact"><div class="label">昨收</div><div class="value">${formatNum(quote?.f18)}</div></div>
        <div class="fact"><div class="label">成交额</div><div class="value">${formatAmount(quote?.f6)}</div></div>
        <div class="fact"><div class="label">视图</div><div class="value">${activeViewLabel()}</div></div>
      `;
    }

    function activeViewLabel() {
      return els.detailTabs.querySelector(`.tab[data-view="${detailState.view}"]`)?.textContent || "--";
    }

    async function renderDetail() {
      if (!detailState.secid || detailState.loading) return;
      detailState.loading = true;
      updateDetailHeader();
      drawLoading(els.detailCanvas, "加载中...");
      try {
        const data = await loadDetailData(detailState.secid, detailState.view);
        if (data.type === "line") {
          chartState.type = "line";
          chartState.data = data.points;
          chartState.days = data.days;
          chartState.window = data.points.length;
          chartState.offset = 0;
        } else {
          chartState.type = "kline";
          chartState.data = data.klines;
          chartState.window = Math.min(chartState.window || 90, data.klines.length, 120);
          chartState.offset = 0;
        }
        drawInteractiveChart();
      } catch (err) {
        drawLoading(els.detailCanvas, `加载失败：${err.message}`);
      } finally {
        detailState.loading = false;
      }
    }

    function resetChartState() {
      chartState = { type: null, data: [], offset: 0, window: 90, hover: null, dragging: false, dragX: 0, dragOffset: 0 };
      if (els.chartTip) els.chartTip.style.display = "none";
      if (els.chartReadout) els.chartReadout.textContent = "移动鼠标查看精确时间、价格和成交量";
    }

    function setupCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, rect.width, rect.height);
      return { ctx, w: rect.width, h: rect.height };
    }

    function drawLoading(canvas, text) {
      const { ctx, w, h } = setupCanvas(canvas);
      const theme = chartTheme();
      ctx.fillStyle = theme.muted;
      ctx.font = "14px Microsoft YaHei UI, sans-serif";
      ctx.fillText(text, 18, h / 2);
    }

    function chartTheme() {
      const styles = getComputedStyle(document.documentElement);
      const ink = styles.getPropertyValue("--ink").trim() || "#181613";
      const panel = styles.getPropertyValue("--panel").trim() || "#fffdf8";
      const muted = styles.getPropertyValue("--muted").trim() || "#70695d";
      const line = styles.getPropertyValue("--line").trim() || "#d8d0c3";
      const dark = document.documentElement.dataset.theme === "dark" ||
        (document.documentElement.dataset.theme === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      return {
        ink,
        panel,
        muted,
        line,
        grid: dark ? "rgba(255,255,255,.1)" : "rgba(24,22,19,.13)",
        washRed: dark ? "rgba(240,90,114,.05)" : "rgba(200,50,50,.045)",
        washGreen: dark ? "rgba(57,184,111,.045)" : "rgba(18,128,92,.045)",
        volumeBg: dark ? "rgba(255,255,255,.05)" : "rgba(24,22,19,.045)",
        cross: dark ? "rgba(210,218,232,.68)" : "rgba(24,22,19,.48)",
        tagBg: dark ? "#4a4f5c" : "#e9e2d6",
        tagText: dark ? "#fff" : ink
      };
    }

    function visibleData() {
      if (chartState.type !== "kline") return chartState.data || [];
      const total = chartState.data.length;
      const win = Math.max(20, Math.min(chartState.window, total));
      const maxOffset = Math.max(0, total - win);
      chartState.offset = Math.max(0, Math.min(chartState.offset, maxOffset));
      const end = total - chartState.offset;
      return chartState.data.slice(Math.max(0, end - win), end);
    }

    function drawInteractiveChart() {
      updateChartTools();
      if (chartState.type === "line") drawLargeLine(els.detailCanvas, chartState.data, quoteMap.get(detailState.secid), chartState.days);
      else if (chartState.type === "kline") drawKline(els.detailCanvas, chartState.data);
    }

    function updateChartTools() {
      const kline = chartState.type === "kline";
      [els.chartZoomIn, els.chartZoomOut, els.chartReset].forEach(button => {
        if (button) button.style.display = kline ? "" : "none";
      });
      if (els.chartPrev) els.chartPrev.title = kline ? "左移" : "上一段";
      if (els.chartNext) els.chartNext.title = kline ? "右移" : "下一段";
    }

    function drawLargeLine(canvas, points, quote, days = 1) {
      const { ctx, w, h } = setupCanvas(canvas);
      const pad = { l: 18, r: 74, t: 24, b: 38 };
      const plotH = h - pad.t - pad.b;
      const values = points.map(p => p.price);
      if (!values.length) return drawLoading(canvas, "暂无分时数据");
      const min = Math.min(...values);
      const max = Math.max(...values);
      const spread = Math.max(max - min, Math.abs(max) * .002, 0.01);
      const yFor = v => pad.t + (max - v) / spread * plotH;
      const xFor = i => values.length === 1 ? pad.l + (w - pad.l - pad.r) / 2 : pad.l + i / (values.length - 1) * (w - pad.l - pad.r);
      const color = Number(quote?.f3) >= 0 ? "#f05a72" : "#39b86f";

      paintChartBackground(ctx, w, h);
      drawGrid(ctx, w, h, pad, min, max, points, "line");
      drawFiveDaySeparators(ctx, w, h, pad, points, days);

      ctx.beginPath();
      points.forEach((p, i) => i ? ctx.lineTo(xFor(i), yFor(p.price)) : ctx.moveTo(xFor(i), yFor(p.price)));
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      if (points.length === 1) {
        ctx.beginPath();
        ctx.arc(xFor(0), yFor(points[0].price), 4, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }

      const current = chartState.hover != null ? points[chartState.hover] : points[points.length - 1];
      if (chartState.hover != null && current) drawLineCrosshair(ctx, w, h, pad, points, current, chartState.hover, yFor, xFor);
      drawVolumeBars(ctx, w, h, pad, [], null);
      updateReadoutForLine(current);
    }

    function drawKline(canvas, klines) {
      const { ctx, w, h } = setupCanvas(canvas);
      const pad = { l: 18, r: 74, t: 24, b: 38 };
      const data = visibleData();
      if (data.length < 2) return drawLoading(canvas, "暂无 K 线数据");
      const min = Math.min(...data.map(k => k.low));
      const max = Math.max(...data.map(k => k.high));
      const spread = Math.max(max - min, Math.abs(max) * .002, 0.01);
      const yFor = v => pad.t + (max - v) / spread * (h - pad.t - pad.b);
      const step = (w - pad.l - pad.r) / data.length;
      const body = Math.max(3, Math.min(13, step * .62));

      paintChartBackground(ctx, w, h);
      drawGrid(ctx, w, h, pad, min, max, data, "kline");
      drawMovingAverages(ctx, data, pad, w, h, yFor, step);
      data.forEach((k, i) => {
        const x = pad.l + i * step + step / 2;
        const up = k.close >= k.open;
        const color = up ? "#f05a72" : "#39b86f";
        const yOpen = yFor(k.open);
        const yClose = yFor(k.close);
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(x, yFor(k.high));
        ctx.lineTo(x, yFor(k.low));
        ctx.stroke();
        const top = Math.min(yOpen, yClose);
        const height = Math.max(2, Math.abs(yClose - yOpen));
        ctx.fillRect(x - body / 2, top, body, height);
      });
      drawVolumeBars(ctx, w, h, pad, data, step);
      const hoverIndex = chartState.hover != null ? Math.max(0, Math.min(chartState.hover, data.length - 1)) : data.length - 1;
      if (chartState.hover != null) drawKlineCrosshair(ctx, w, h, pad, data, hoverIndex, yFor, step);
      updateReadoutForKline(data[hoverIndex]);
    }

    function paintChartBackground(ctx, w, h) {
      const theme = chartTheme();
      ctx.fillStyle = theme.panel;
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = theme.washRed;
      ctx.fillRect(w - 112, 0, 112, h);
      ctx.fillStyle = theme.washGreen;
      ctx.fillRect(w - 112, h * .52, 112, h * .48);
    }

    function drawGrid(ctx, w, h, pad, min, max, data, type) {
      const theme = chartTheme();
      ctx.strokeStyle = theme.grid;
      ctx.lineWidth = 1;
      ctx.fillStyle = theme.muted;
      ctx.font = "12px Consolas, Microsoft YaHei UI, monospace";
      ctx.textAlign = "left";
      for (let i = 0; i <= 6; i++) {
        const y = pad.t + i / 6 * (h - pad.t - pad.b);
        const value = max - i / 6 * (max - min);
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(w - pad.r, y);
        ctx.stroke();
        ctx.fillText(formatNum(value), w - pad.r + 10, y + 4);
      }
      const ticks = Math.min(8, Math.max(3, Math.floor((w - pad.l - pad.r) / 130)));
      for (let i = 0; i <= ticks; i++) {
        const x = pad.l + i / ticks * (w - pad.l - pad.r);
        ctx.beginPath();
        ctx.moveTo(x, pad.t);
        ctx.lineTo(x, h - pad.b);
        ctx.stroke();
        const index = Math.min(data.length - 1, Math.round(i / ticks * (data.length - 1)));
        const label = type === "line" ? formatTimeTick(data[index]?.time) : data[index]?.date;
        ctx.fillStyle = theme.muted;
        ctx.textAlign = i === ticks ? "right" : "left";
        ctx.fillText(label || "", i === ticks ? x - 4 : x + 4, h - 12);
      }
      ctx.textAlign = "left";
    }

    function drawFiveDaySeparators(ctx, w, h, pad, points, days) {
      if (days < 2) return;
      const plotW = w - pad.l - pad.r;
      let lastDate = points[0]?.time?.slice(0, 10);
      points.forEach((p, i) => {
        const date = p.time.slice(0, 10);
        if (i && date !== lastDate) {
          const x = pad.l + i / (points.length - 1) * plotW;
          ctx.strokeStyle = chartTheme().cross;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.moveTo(x, pad.t);
          ctx.lineTo(x, h - pad.b);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "#e0a942";
          ctx.font = "12px Consolas, Microsoft YaHei UI, monospace";
          ctx.fillText(date.slice(5), x + 6, pad.t + 16);
          lastDate = date;
        }
      });
    }

    function drawMovingAverages(ctx, data, pad, w, h, yFor, step) {
      [
        { n: 5, color: "#e0a942" },
        { n: 10, color: "#df5c91" },
        { n: 20, color: "#55bfd2" }
      ].forEach(ma => {
        ctx.beginPath();
        data.forEach((_, i) => {
          if (i < ma.n - 1) return;
          const slice = data.slice(i - ma.n + 1, i + 1);
          const avg = slice.reduce((sum, k) => sum + k.close, 0) / ma.n;
          const x = pad.l + i * step + step / 2;
          const y = yFor(avg);
          if (i === ma.n - 1) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = ma.color;
        ctx.lineWidth = 1.3;
        ctx.stroke();
      });
    }

    function drawVolumeBars(ctx, w, h, pad, data, step) {
      const volTop = h - Math.max(86, h * .2);
      const theme = chartTheme();
      ctx.fillStyle = theme.volumeBg;
      ctx.fillRect(pad.l, volTop, w - pad.l - pad.r, h - pad.b - volTop);
      if (!data?.length || !step) return;
      const maxVol = Math.max(...data.map(k => k.volume || 0), 1);
      data.forEach((k, i) => {
        const x = pad.l + i * step + step * .2;
        const barH = (k.volume || 0) / maxVol * (h - pad.b - volTop);
        ctx.fillStyle = k.close >= k.open ? "rgba(240,90,114,.45)" : "rgba(57,184,111,.45)";
        ctx.fillRect(x, h - pad.b - barH, Math.max(1, step * .6), barH);
      });
      ctx.fillStyle = theme.muted;
      ctx.font = "12px Consolas, Microsoft YaHei UI, monospace";
      ctx.fillText("VOLUME", pad.l + 8, volTop + 18);
    }

    function drawLineCrosshair(ctx, w, h, pad, points, item, index, yFor, xFor) {
      const x = xFor(index);
      const y = yFor(item.price);
      drawCrosshair(ctx, w, h, pad, x, y, formatNum(item.price));
      positionTooltip(x, y, [
        item.time,
        `价格 ${formatNum(item.price)}`,
        `涨跌 ${formatPctFromQuote(item.price)}`
      ]);
    }

    function drawKlineCrosshair(ctx, w, h, pad, data, index, yFor, step) {
      const k = data[index];
      if (!k) return;
      const x = pad.l + index * step + step / 2;
      const y = yFor(k.close);
      drawCrosshair(ctx, w, h, pad, x, y, formatNum(k.close));
      positionTooltip(x, y, [
        k.date,
        `开 ${formatNum(k.open)} 高 ${formatNum(k.high)}`,
        `低 ${formatNum(k.low)} 收 ${formatNum(k.close)}`,
        `涨跌 ${formatNum(k.change)} / ${formatNum(k.pct)}%`,
        `量 ${formatAmount(k.volume)} 额 ${formatAmount(k.amount)}`
      ]);
    }

    function drawCrosshair(ctx, w, h, pad, x, y, priceText) {
      ctx.save();
      ctx.setLineDash([5, 5]);
      const theme = chartTheme();
      ctx.strokeStyle = theme.cross;
      ctx.beginPath();
      ctx.moveTo(x, pad.t);
      ctx.lineTo(x, h - pad.b);
      ctx.moveTo(pad.l, y);
      ctx.lineTo(w - pad.r, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = theme.tagBg;
      ctx.fillRect(w - pad.r + 2, y - 16, 68, 32);
      ctx.fillStyle = theme.tagText;
      ctx.font = "12px Consolas, Microsoft YaHei UI, monospace";
      ctx.fillText(priceText, w - pad.r + 8, y + 4);
      ctx.restore();
    }

    function positionTooltip(x, y, lines) {
      if (!els.chartTip) return;
      els.chartTip.innerHTML = lines.join("<br>");
      els.chartTip.style.display = "block";
      const wrap = els.detailCanvas.parentElement.getBoundingClientRect();
      const left = Math.min(Math.max(8, x + 14), wrap.width - 230);
      const top = Math.min(Math.max(8, y + 12), wrap.height - 120);
      els.chartTip.style.transform = `translate(${left}px, ${top}px)`;
    }

    function updateReadoutForLine(item) {
      if (!item) return;
      els.chartReadout.textContent = `${item.time}  最新 ${formatNum(item.price)}  ${formatPctFromQuote(item.price)}`;
    }

    function updateReadoutForKline(k) {
      if (!k) return;
      els.chartReadout.textContent = `${k.date}  开 ${formatNum(k.open)}  高 ${formatNum(k.high)}  低 ${formatNum(k.low)}  收 ${formatNum(k.close)}  涨跌 ${formatNum(k.pct)}%  量 ${formatAmount(k.volume)}`;
    }

    function formatPctFromQuote(price) {
      const quote = quoteMap.get(detailState.secid);
      const base = Number(quote?.f18);
      if (!Number.isFinite(base) || !base) return "--";
      const pct = (Number(price) - base) / base * 100;
      return `${pct >= 0 ? "+" : ""}${formatNum(pct)}%`;
    }

    function formatTimeTick(value) {
      if (!value) return "";
      const text = String(value);
      if (text.length >= 16) return text.slice(5, 16).replace(" ", " ");
      return text;
    }

    function chartIndexFromEvent(event) {
      const rect = els.detailCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const pad = { l: 18, r: 74 };
      const plotW = rect.width - pad.l - pad.r;
      if (plotW <= 0) return 0;
      if (chartState.type === "line") {
        return Math.max(0, Math.min(chartState.data.length - 1, Math.round((x - pad.l) / plotW * (chartState.data.length - 1))));
      }
      const data = visibleData();
      const step = plotW / Math.max(1, data.length);
      return Math.max(0, Math.min(data.length - 1, Math.floor((x - pad.l) / step)));
    }

    function handleChartMove(event) {
      if (!chartState.data?.length) return;
      if (chartState.dragging && chartState.type === "kline") {
        const rect = els.detailCanvas.getBoundingClientRect();
        const step = (rect.width - 18 - 74) / Math.max(1, chartState.window);
        const delta = Math.round((event.clientX - chartState.dragX) / Math.max(1, step));
        chartState.offset = Math.max(0, chartState.dragOffset + delta);
        drawInteractiveChart();
        return;
      }
      chartState.hover = chartIndexFromEvent(event);
      drawInteractiveChart();
    }

    function handleChartLeave() {
      if (chartState.dragging) return;
      chartState.hover = null;
      if (els.chartTip) els.chartTip.style.display = "none";
      drawInteractiveChart();
    }

    function shiftChart(direction) {
      if (!chartState.data?.length) return;
      if (chartState.type === "kline") {
        chartState.offset = Math.max(0, chartState.offset + direction * Math.max(5, Math.round(chartState.window * .35)));
      } else {
        if ((chartState.days || 1) === 1 && direction < 0) {
          detailState.view = "five";
          resetChartState();
          setActiveTab("five");
          renderDetail();
          return;
        }
        const size = Math.max(1, Math.round(chartState.data.length / Math.max(1, chartState.days || 1)));
        chartState.hover = Math.max(0, Math.min(chartState.data.length - 1, (chartState.hover ?? chartState.data.length - 1) + direction * size));
      }
      drawInteractiveChart();
    }

    function zoomChart(direction) {
      if (chartState.type !== "kline") return;
      const next = chartState.window + direction * 15;
      chartState.window = Math.max(25, Math.min(180, next, chartState.data.length));
      drawInteractiveChart();
    }

    async function addSymbol(secidOverride) {
      const secid = secidOverride || await resolveInputToSecid();
      if (!secid) {
        toast("没有找到匹配的股票/指数");
        return;
      }
      if (symbols.includes(secid)) {
        toast("这个代码已经在看板里了");
        return;
      }
      symbols.push(secid);
      saveSymbols();
      els.input.value = "";
      renderSuggestions([]);
      render();
      refreshAll();
    }

    function removeSymbol(secid) {
      symbols = symbols.filter(item => item !== secid);
      quoteMap.delete(secid);
      trendMap.delete(secid);
      saveSymbols();
      render();
    }

    function setDisplayMetric(secid, metric) {
      if (!METRICS.includes(metric)) return;
      displayMetrics[secid] = metric;
      saveDisplayMetrics();
      render();
    }

    function moveSymbolBefore(source, target) {
      if (!source || !target || source === target) return;
      const from = symbols.indexOf(source);
      const to = symbols.indexOf(target);
      if (from < 0 || to < 0) return;
      const [item] = symbols.splice(from, 1);
      const adjusted = from < to ? to - 1 : to;
      symbols.splice(adjusted, 0, item);
      saveSymbols();
      render();
    }

    function resetSymbols() {
      symbols = DEFAULT_SYMBOLS.slice();
      saveSymbols();
      render();
      refreshAll();
    }

    function updateClock() {
      const now = new Date();
      els.clock.textContent = `最后更新 ${now.toLocaleTimeString("zh-CN", { hour12: false })}`;
    }

    function scheduleRefresh() {
      clearInterval(refreshTimer);
      const seconds = saveRefreshSeconds();
      refreshTimer = setInterval(refreshAll, seconds * 1000);
    }

    els.add.addEventListener("click", addSymbol);
    els.refresh.addEventListener("click", refreshAll);
    els.reset.addEventListener("click", resetSymbols);
    els.theme.addEventListener("click", nextTheme);
    els.sync.addEventListener("click", setupCloudSync);
    els.settings.addEventListener("click", openSettings);
    els.settingsClose.addEventListener("click", closeSettings);
    els.settingsModal.addEventListener("click", event => {
      if (event.target === els.settingsModal) closeSettings();
    });
    els.settingsInterval.addEventListener("change", applySettingsInterval);
    els.settingsInterval.addEventListener("blur", applySettingsInterval);
    els.settingsThemeRange.addEventListener("input", applySettingsTheme);
    els.settingsSync.addEventListener("click", setupCloudSync);
    els.settingsReset.addEventListener("click", confirmResetSymbols);
    els.chartPrev.addEventListener("click", () => shiftChart(chartState.type === "kline" ? 1 : -1));
    els.chartNext.addEventListener("click", () => shiftChart(chartState.type === "kline" ? -1 : 1));
    els.chartZoomIn.addEventListener("click", () => zoomChart(-1));
    els.chartZoomOut.addEventListener("click", () => zoomChart(1));
    els.chartReset.addEventListener("click", () => {
      chartState.offset = 0;
      chartState.hover = null;
      chartState.window = Math.min(chartState.data.length || 90, 90);
      drawInteractiveChart();
    });
    els.detailCanvas.addEventListener("mousemove", handleChartMove);
    els.detailCanvas.addEventListener("mouseleave", handleChartLeave);
    els.detailCanvas.addEventListener("mousedown", event => {
      if (chartState.type !== "kline") return;
      chartState.dragging = true;
      chartState.dragX = event.clientX;
      chartState.dragOffset = chartState.offset;
    });
    window.addEventListener("mouseup", () => {
      chartState.dragging = false;
    });
    els.detailCanvas.addEventListener("wheel", event => {
      if (chartState.type !== "kline") return;
      event.preventDefault();
      zoomChart(event.deltaY > 0 ? 1 : -1);
    }, { passive: false });
    els.interval.value = loadRefreshSeconds();
    els.interval.addEventListener("change", scheduleRefresh);
    els.interval.addEventListener("blur", scheduleRefresh);
    els.input.addEventListener("input", scheduleSearch);
    els.input.addEventListener("blur", () => {
      setTimeout(() => renderSuggestions([]), 180);
    });
    els.input.addEventListener("keydown", event => {
      if (event.key === "ArrowDown") {
        event.preventDefault();
        moveSuggestion(1);
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        moveSuggestion(-1);
      } else if (event.key === "Enter") {
        event.preventDefault();
        const selected = selectedSuggestion();
        addSymbol(selected?.secid);
      } else if (event.key === "Escape") {
        renderSuggestions([]);
      }
    });
    els.suggestions.addEventListener("mousedown", event => {
      const item = event.target.closest("[data-index]");
      if (!item) return;
      event.preventDefault();
      activeSuggestionIndex = Number(item.dataset.index);
      const selected = selectedSuggestion();
      if (selected) addSymbol(selected.secid);
    });
    els.suggestions.addEventListener("mousemove", event => {
      const item = event.target.closest("[data-index]");
      if (!item) return;
      const next = Number(item.dataset.index);
      if (next !== activeSuggestionIndex) {
        activeSuggestionIndex = next;
        renderSuggestions(suggestions);
      }
    });
    els.grid.addEventListener("click", event => {
      const button = event.target.closest("[data-remove]");
      if (button) {
        event.stopPropagation();
        removeSymbol(button.dataset.remove);
        return;
      }
      const card = event.target.closest("[data-secid]");
      if (card) openDetail(card.dataset.secid);
    });
    els.marketStrip.addEventListener("click", event => {
      const chip = event.target.closest("[data-index-open]");
      if (chip) openDetail(chip.dataset.indexOpen);
    });
    let draggedSecid = null;
    document.addEventListener("dragstart", event => {
      const source = event.target.closest("[data-secid], [data-index-open]");
      if (!source) return;
      draggedSecid = source.dataset.secid || source.dataset.indexOpen;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedSecid);
      source.classList.add("dragging");
    });
    document.addEventListener("dragover", event => {
      const target = event.target.closest("[data-secid], [data-index-open]");
      if (!target || !draggedSecid) return;
      event.preventDefault();
      target.classList.add("drop-target");
    });
    document.addEventListener("dragleave", event => {
      event.target.closest("[data-secid], [data-index-open]")?.classList.remove("drop-target");
    });
    document.addEventListener("drop", event => {
      const target = event.target.closest("[data-secid], [data-index-open]");
      if (!target || !draggedSecid) return;
      event.preventDefault();
      const targetSecid = target.dataset.secid || target.dataset.indexOpen;
      document.querySelectorAll(".dragging,.drop-target").forEach(el => el.classList.remove("dragging", "drop-target"));
      moveSymbolBefore(draggedSecid, targetSecid);
      draggedSecid = null;
    });
    document.addEventListener("dragend", () => {
      draggedSecid = null;
      document.querySelectorAll(".dragging,.drop-target").forEach(el => el.classList.remove("dragging", "drop-target"));
    });
    els.detailClose.addEventListener("click", closeDetail);
    els.modal.addEventListener("click", event => {
      if (event.target === els.modal) closeDetail();
    });
    els.detailTabs.addEventListener("click", event => {
      const tab = event.target.closest("[data-view]");
      if (!tab) return;
      detailState.view = tab.dataset.view;
      resetChartState();
      setActiveTab(detailState.view);
      renderDetail();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeDetail();
    });
    window.addEventListener("resize", renderCharts);
    window.addEventListener("resize", () => {
      if (els.modal.classList.contains("open")) renderDetail();
    });

    applyTheme(localStorage.getItem(THEME_KEY) || "auto");
    const existingSyncId = syncId();
    if (existingSyncId) downloadCloudSync(existingSyncId).catch(() => {});
    render();
    refreshAll();
    scheduleRefresh();
  </script>
</body>
</html>
